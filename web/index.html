<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Start — Schul-Tinder</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">Schul-Tinder</a>
    <nav>
      <span id="nav-guest">
        <a href="/login.html">Login</a>
        <a href="/register.html" class="btn btn-small">Registrieren</a>
      </span>
      <span id="nav-user" class="hidden" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
        <span class="nav-user" id="nav-username"></span>
        <a href="/dashboard.html" class="btn btn-small">Dashboard</a>
        <a href="/chat.html" class="btn btn-small btn-secondary">Chat</a>
        <a href="/settings.html" class="btn btn-small btn-secondary">Einstellungen</a>
        <form class="inline-form" action="/logout" method="post">
          <button type="submit" class="btn btn-ghost">Logout</button>
        </form>
      </span>
    </nav>
  </header>

  <main class="container">
    <ul id="flash-banner"></ul>
    <section class="hero">
      <h1>Willkommen</h1>
      <p class="lead">Normale Webseiten (HTML) mit Login und Registrierung. Auf dem Raspberry Pi im Browser öffnen.</p>
      <div class="actions">
        <a class="btn" href="/register.html">Konto erstellen</a>
        <a class="btn btn-secondary" href="/login.html">Einloggen</a>
      </div>
    </section>
  </main>
  <script src="/js/flash.js"></script>
  <script src="/js/nav.js"></script>
</body>
</html>
