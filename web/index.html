<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Start — lehrngruppen finder</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">lehrngruppen finder</a>
    <nav>
      <span id="nav-guest">
        <a href="/login.html">Login</a>
        <a href="/einladung.html" class="btn btn-small btn-secondary">Einladungscode</a>
      </span>
      <span id="nav-user" class="hidden" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
        <span class="nav-user" id="nav-username"></span>
        <a href="/dashboard.html" class="btn btn-small">Dashboard</a>
        <a href="/chat.html" class="btn btn-small btn-secondary">Chat</a>
        <a href="/settings.html" class="btn btn-small btn-secondary">Einstellungen</a>
        <a href="/admin.html" id="nav-admin" class="btn btn-small hidden">Admin</a>
        <form class="inline-form" action="/logout" method="post">
          <button type="submit" class="btn btn-ghost">Logout</button>
        </form>
      </span>
    </nav>
  </header>

  <main class="container">
    <ul id="flash-banner"></ul>
    <section class="hero">
      <h1>Willkommen</h1>
      <p class="lead">Login mit bestehendem Konto — oder mit <strong>Einladungscode</strong> vom Admin. Auf dem Raspberry Pi im Browser öffnen.</p>
      <p class="muted hidden" id="setup-hint">Noch keine Nutzer? <a href="/setup.html">Ersten Administrator anlegen</a></p>
      <div class="actions">
        <a class="btn" href="/login.html">Einloggen</a>
        <a class="btn btn-secondary" href="/einladung.html">Mit Code registrieren</a>
      </div>
    </section>
  </main>
  <script src="/js/flash.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/setup-hint.js"></script>
</body>
</html>
