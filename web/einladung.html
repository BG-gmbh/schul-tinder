<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mit Einladungscode — lerngruppen finder</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">lerngruppen finder</a>
    <nav>
      <a href="/login.html">Login</a>
    </nav>
  </header>

  <main class="container container-wide">
    <ul id="flash-banner"></ul>
    <section class="card">
      <h1>Konto mit Code</h1>
      <p class="field-hint">Gib den <strong>Einmal-Code</strong> vom Administrator ein, dann wählst du Benutzername und Passwort. Der Code ist danach ungültig.</p>

      <form method="post" action="/einladung" class="stack-form" autocomplete="on">
        <label>
          Einladungscode
          <input name="code" type="text" required autocomplete="one-time-code" placeholder="z. B. a1b2c3d4e5f6" id="field-code">
        </label>
        <label>
          Benutzername
          <input name="username" type="text" required minlength="3" maxlength="64" autocomplete="username">
        </label>
        <label>
          Passwort
          <input name="password" type="password" required minlength="6" autocomplete="new-password">
        </label>
        <label>
          Passwort bestätigen
          <input name="password_confirm" type="password" required minlength="6" autocomplete="new-password">
        </label>
        <button type="submit" class="btn btn-block">Konto anlegen</button>
      </form>
      <p class="muted"><a href="/login.html">Zum Login</a></p>
    </section>
  </main>
  <script src="/js/flash.js"></script>
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var c = p.get("code");
      if (c) {
        var el = document.getElementById("field-code");
        if (el) el.value = c;
      }
    })();
  </script>
</body>
</html>
