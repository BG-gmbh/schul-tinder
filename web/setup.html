<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Erster Administrator — lerngruppen finder</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">lerngruppen finder</a>
    <nav><span class="nav-user">Einmal-Setup</span></nav>
  </header>

  <main class="container container-wide">
    <ul id="flash-banner"></ul>
    <section class="card">
      <h1>Admin festlegen</h1>
      <p class="field-hint">Es gibt gerade keinen Administrator. Lege hier mit einem Namen und Passwort einen Admin fest. Wenn der Name schon als Nutzer existiert, wird dieses Konto zum Admin gemacht.</p>

      <form method="post" action="/setup" class="stack-form" autocomplete="on">
        <label>
          Benutzername (Admin)
          <input name="username" type="text" required minlength="3" maxlength="64" autocomplete="username">
        </label>
        <label>
          Passwort
          <input name="password" type="password" required minlength="6" autocomplete="new-password">
        </label>
        <label>
          Passwort bestätigen
          <input name="password_confirm" type="password" required minlength="6" autocomplete="new-password">
        </label>

        <input type="hidden" name="level_german" value="pro">
        <input type="hidden" name="level_math" value="pro">
        <input type="hidden" name="level_english" value="pro">
        <input type="hidden" name="level_biology" value="pro">
        <input type="hidden" name="level_pgw" value="pro">
        <input type="hidden" name="level_spanish" value="pro">
        <input type="hidden" name="level_art" value="pro">

        <button type="submit" class="btn btn-block">Admin festlegen</button>
      </form>
    </section>
  </main>
  <script src="/js/flash.js"></script>
</body>
</html>
